name: Deploy to Firebase Hosting

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Best-effort: the auto-generated hosting service account may lack Firestore
      # permission. If this fails, deploy firestore.rules from the Firebase Console
      # (Firestore → Rules) or grant the SA the "Firebase Rules Admin" role.
      - name: Deploy Firestore security rules
        continue-on-error: true
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
          GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json" \
            npx --yes firebase-tools@13 deploy --only firestore:rules \
            --project fin-plan-59c19 --non-interactive

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: fin-plan-59c19
